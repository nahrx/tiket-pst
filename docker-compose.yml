services:
  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: tiket-bps-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./public:/app/public # mount frontend HTML
networks:
  metabase-postgresql-alpine_default:
    external: true
